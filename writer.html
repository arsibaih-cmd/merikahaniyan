<!DOCTYPE html>
<html>

    <title>Write Your Story</title>

<div style="padding:60px; max-width:700px; margin:auto;">
    <h1>✍️ Apni Kahani Likho</h1>

    </form>

    <br>
    <a href="index.html">⬅ Back to Home</a>
